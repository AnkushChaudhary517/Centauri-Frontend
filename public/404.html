<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Centauri</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="The page you requested could not be found." />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #dbeafe 0%, #eff6ff 35%, #ffffff 75%);
        color: #0f172a;
      }

      main {
        width: min(100%, 720px);
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.1);
        padding: 40px 32px;
        text-align: center;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.05;
      }

      p {
        margin: 0 auto;
        max-width: 560px;
        color: #475569;
        font-size: 1rem;
        line-height: 1.7;
      }

      .eyebrow {
        color: #2563eb;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .actions {
        margin-top: 28px;
      }

      a {
        display: inline-block;
        padding: 12px 22px;
        border-radius: 999px;
        background: #2563eb;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Error 404</div>
      <h1>This page drifted out of orbit</h1>
      <p>
        The page may have moved or the link may be out of date. Return to Centauri to keep
        improving your content with clearer SEO and AI indexing guidance.
      </p>
      <div class="actions">
        <a href="/">Return Home</a>
      </div>
    </main>
  </body>
</html>
